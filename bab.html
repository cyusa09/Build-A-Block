<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="bab.css">
<title>BuildABlock</title>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>BuildABlock</h1>
  <p>Plan your land. Build your future.</p>
</div>

<!-- LOGIN CARD -->
<div class="container">

  <div class="toggle">
    <span class="active">Sign in</span>
    <span>Create account</span>
  </div>

  <button class="btn apple">Continue with Apple</button>
  <button class="btn google">Continue with Google</button>

  <div class="divider">or</div>

  <button class="btn email">Sign in with email</button>

  <div class="footer">
    By continuing, you agree to our Terms of Service and Privacy Policy.
  </div>

</div>
<!-- AI feature-->
 <div style="margin:40px; text-align:center;">
  <h2>Ask Your Land AI 🌱</h2>
  <input type="text" placeholder="Ask about your land..." style="padding:10px; width:60%;">
  <button class="ai-button" style="padding:10px;">Ask AI</button>
</div>

</body>
</html>
