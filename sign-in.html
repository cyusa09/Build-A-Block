<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in here</title>
    <link rel="stylesheet" href="sign-in.css">
    <script src="sign-in.js"></script>
</head>
<body style="background-image: url('babbg.png'); 
            background-size: cover;
            background-position: center; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;"
            opacity: 0.5>
    <div class="signing-in">
        <div class="sign-in-container">
            <h2>Sign In</h2>
            <form action="#" method="GET">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <br><br>
                <button type="submit" onclick="start(event)" class="login">Sign In</button>
            </form>
            <p>Don't have an account? <a href="sign-up.html">Sign Up</a></p>
        </div>
    
<div id="auth-loader" style="display:none;
                       position:fixed; 
                       inset:0; 
                       z-index:999; 
                       background:rgba(5,46,22,0.9); 
                       backdrop-filter:blur(10px); 
                       flex-direction:column; 
                       align-items:center; 
                       justify-content:center;">
    <div class="loader-circle" style="width:50px; height:50px; border:3px solid #facc15; border-top-color:transparent; border-radius:50%; animate: spin 1s linear infinite;"></div>
    <h2 style="color:#facc15; margin-top:20px; font-family:sans-serif;">AUTHENTICATING...</h2>
</div>

<div class="social-signin-container">
  <button type="button" class="btn-social apple" onclick="handleAuth('apple')">Continue with Apple</button>
  <button type="button" class="btn-social google" onclick="handleAuth('google')">Continue with Google</button>
  <button type="button" class="btn-social instagram" onclick="handleAuth('instagram')">Continue with Instagram </button>
</div>


</body>
</html>
