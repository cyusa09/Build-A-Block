<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up here</title>
    <link rel="stylesheet" href="sign-up.css">
    <script src="sign-up.js"></script>
</head>
<body style="background-image: url('babbg.png'); background-size: cover; background-position: center; height: 100vh; display: flex; justify-content: center; align-items: center;" opacity: 0.5>
   <div class="sign-up-container">
  <h2>Create Account</h2>
  <form id="signupForm">
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" required>
    </div>

    <div class="input-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="email@example.com" required>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required>
    </div>

    <div class="input-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" required>
    </div>

    <button type="submit" class="btn-signup" onclick="window.location.href='platform.html'">Sign Up</button>
    <p id="errorMessage" class="error-text"></p>
  </form>
  <p class="switch-form">Already have an account? <a href="sign-in.html">Sign In</a></p>
</div>
</body>
</html>
